<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Word Trainer Part 4 (901-1200語)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Comfortaa', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .speech-active-section { border-color: #4f46e5 !important; background-color: rgba(79, 70, 229, 0.05) !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.08); transform: scale(1.01); }
        button, select { min-height: 46px; }
        #start-overlay { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; padding: 2rem; }

</head>
<body class="min-height-screen flex flex-col justify-between text-slate-800">
    <div id="start-overlay">
        <div style="text-align:center;">
            <div style="width:88px;height:88px;background:rgba(255,255,255,0.2);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 32px rgba(0,0,0,0.15);"><i class="fa-solid fa-book-open" style="font-size:2.5rem;color:white;"></i></div>
            <h1 class="logo-font" style="font-size:2rem;font-weight:700;color:white;margin-bottom:0.3rem;">Word Trainer</h1>
            <p style="color:rgba(254,205,211,1);font-size:0.9rem;">Part 4: 共通テスト必須 No.10〜12</p>
        </div>
        <button id="start-btn" onclick="startApp()"><i class="fa-solid fa-play" style="margin-right:0.6rem;"></i>タップして開始</button>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col lg:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-rose-600 text-white p-2 rounded-xl shadow-md"><i class="fa-solid fa-book-open text-xl"></i></div>
                <div><h1 class="text-lg font-bold text-slate-900 logo-font">Gemini Word Trainer</h1><p class="text-[10px] text-slate-500 font-semibold">Part 4 (No.10〜12 収録)</p></div>
            </div>
            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl w-full lg:w-auto">
                <span class="text-xs font-bold text-slate-500 px-2 hidden sm:inline">教材:</span>
                <select id="select-pack" onchange="changeLearningPack()" class="bg-white border-0 text-slate-800 font-bold text-sm py-1.5 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-500 shadow-sm w-full lg:w-auto">
                    <option value="pack10" selected>No.10 政治経済・グローバル</option>
                    <option value="pack11">No.11 抽象概念・高度語彙 A</option>
                    <option value="pack12">No.12 抽象概念・高度語彙 B</option>
                </select>
            </div>
            <div class="flex gap-2 w-full lg:w-auto justify-end">
                <button onclick="switchTab('player')" id="tab-btn-player" class="tab-btn flex-1 lg:flex-none px-4 py-2 rounded-lg text-sm font-semibold transition bg-rose-50 text-rose-700"><i class="fa-solid fa-play mr-1.5"></i>プレーヤー</button>
                <button onclick="switchTab('list')" id="tab-btn-list" class="tab-btn flex-1 lg:flex-none px-4 py-2 rounded-lg text-sm font-semibold transition text-slate-600 hover:bg-slate-100"><i class="fa-solid fa-list mr-1.5"></i>一覧 (<span class="total-count-badge">0</span>)</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto p-4 flex flex-col justify-center">
        <!-- プレーヤータブ -->
        <div id="tab-player" class="tab-content block space-y-6">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-3">
                <div class="flex flex-col sm:flex-row justify-between gap-3 pb-2 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <div class="inline-flex rounded-lg p-1 bg-slate-100">
                            <button id="mode-all-btn" onclick="setPlaybackMode('all')" class="px-3 py-1 rounded-md text-xs font-semibold bg-white text-rose-600 shadow-sm">全単語 (<span id="count-all-words">0</span>)</button>
                            <button id="mode-unclear-btn" onclick="setPlaybackMode('unclear')" class="px-3 py-1 rounded-md text-xs font-semibold text-slate-600">わからない (<span id="count-unclear-words">0</span>)</button>
                        </div>
                    </div>
                    <span id="progress-text" class="text-sm font-bold text-slate-700">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div id="progress-bar" class="bg-rose-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-md p-6 sm:p-10 relative overflow-hidden min-h-[440px] flex flex-col justify-between">
                <div class="absolute top-4 right-4 z-20">
                    <button id="card-unclear-toggle" onclick="toggleCurrentUnclear()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-400 font-semibold text-xs shadow-sm"><i class="fa-regular fa-star text-sm" id="card-unclear-icon"></i><span id="card-unclear-text">わからない</span></button>
                </div>
                <div class="space-y-3.5 z-10 mt-6" id="card-content-area">
                    <div id="section-word" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50"><div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2.5 py-0.5 rounded-full">Step 1: Word</span><button onclick="speakCurrentPart('word')" class="text-indigo-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div><h2 id="card-word" class="text-3xl sm:text-4xl font-extrabold text-slate-950">Loading...</h2></div>
                    <div id="section-meaning" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50"><div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2.5 py-0.5 rounded-full">Step 2: Meaning</span><button onclick="speakCurrentPart('meaning')" class="text-rose-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div><p id="card-meaning" class="text-lg sm:text-xl font-bold text-slate-850">—</p></div>
                    <div id="section-sentence" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50"><div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-teal-500 bg-teal-50 px-2.5 py-0.5 rounded-full">Step 3: Example</span><button onclick="speakCurrentPart('sentence')" class="text-teal-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div><p id="card-sentence" class="text-base sm:text-lg font-medium text-slate-700 italic">—</p></div>
                    <div id="section-translation" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50"><div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-amber-500 bg-amber-50 px-2.5 py-0.5 rounded-full">Step 4: Translation</span><button onclick="speakCurrentPart('translation')" class="text-amber-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div><p id="card-translation" class="text-sm sm:text-base font-normal text-slate-600">—</p></div>
                </div>
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-8 pt-6 border-t border-slate-100 z-10">
                    <div class="flex items-center gap-3">
                        <button id="btn-autoplay" onclick="toggleAutoPlay()" class="px-4 py-1.5 rounded-xl text-sm font-semibold border border-rose-200 bg-rose-50 text-rose-800 shadow-sm flex items-center gap-2"><span class="relative flex h-3.5 w-3.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75" id="ping-indicator"></span><span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-rose-500" id="status-dot"></span></span><span id="text-autoplay">自動再生 ON</span></button>
                        <select id="select-interval" onchange="changeInterval()" class="bg-transparent border-b border-slate-300 text-slate-600 text-xs py-0.5"><option value="1500" selected>短め</option><option value="2500">普通</option><option value="4000">長め</option></select>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="prevWord()" class="w-12 h-12 rounded-full border border-slate-200 bg-white flex justify-center items-center shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                        <button id="btn-play-all" onclick="togglePlayPause()" class="px-8 h-12 rounded-full bg-rose-600 text-white font-bold shadow-md flex items-center gap-2"><i class="fa-solid fa-play"></i><span id="text-play-all">再生</span></button>
                        <button onclick="nextWord()" class="w-12 h-12 rounded-full border border-slate-200 bg-white flex justify-center items-center shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <select id="select-rate" onchange="changeRate()" class="bg-transparent border-b border-slate-300 text-slate-600 text-xs py-0.5"><option value="0.8">0.8x</option><option value="1.0" selected>1.0x</option><option value="1.2">1.2x</option></select>
                </div>
            </div>
        </div>

        <!-- 一覧タブ -->
        <div id="tab-list" class="tab-content hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto max-h-[500px]">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500"><th class="py-3 px-4 w-16 text-center">マーク</th><th class="py-3 px-4 w-16">No.</th><th class="py-3 px-4">英単語</th><th class="py-3 px-4">意味</th><th class="py-3 px-4 hidden md:table-cell">例文</th></tr></thead>
                        <tbody id="word-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const packs = {
            pack10: [
                {"word":"Democracy","meaning":"民主主義","sentence":"A healthy democracy relies on active citizen participation.","translation":"健全な民主主義は市民の積極的な参加に依存している。"},
                {"word":"Sovereignty","meaning":"主権、統治権","sentence":"The treaty respects the sovereignty of all member nations.","translation":"その条約はすべての加盟国の主権を尊重している。"},
                {"word":"Constitution","meaning":"憲法、組織、体質","sentence":"The court decided that the new law contradicts the constitution.","translation":"裁判所は、その新しい法律が憲法と矛盾していると判定した。"},
                {"word":"Legislation","meaning":"法律、立法行為","sentence":"The council proposed strict legislation to reduce carbon emission.","translation":"議会は炭素排出を削減するための厳しい法律（立法）を提案した。"},
                {"word":"Administration","meaning":"行政、政府、管理運営","sentence":"The presidential administration announced a new financial policy.","translation":"大統領政府（政権）は新しい財政政策を発表した。"},
                {"word":"Bureaucracy","meaning":"官僚制度、お役所仕事","sentence":"The administrative process was slowed down by heavy bureaucracy.","translation":"行政手続きは煩雑なお役所仕事によって遅らされた。"},
                {"word":"Electorate","meaning":"有権者、選挙民","sentence":"The candidate tried hard to persuade the local electorate.","translation":"候補者は地元の有権者（選挙民）を説得しようと必死だった。"},
                {"word":"Campaign","meaning":"選挙運動、キャンペーン","sentence":"The politician started his election campaign in urban areas.","translation":"その政治家は都市部で選挙運動を開始した。"},
                {"word":"Parliament","meaning":"国会、議会（英など）","sentence":"The prime minister addressed the parliament on the budget deficit.","translation":"首相は予算赤字に関して国会（議会）で演説した。"},
                {"word":"Congress","meaning":"国会、議会（米など）","sentence":"The US Congress voted to approve financial aid for the region.","translation":"米国議会は、その地域への財政支援を承認することを決議した。"},
                {"word":"Senate","meaning":"上院","sentence":"The Senate reviewed the proposal to increase consumption tax.","translation":"上院は消費税率を引き上げる提案を再検討した。"},
                {"word":"Embassy","meaning":"大使館、使節","sentence":"Please contact the Japanese embassy if you lose your passport.","translation":"パスポートを紛失した場合は日本大使館に連絡してください。"},
                {"word":"Diplomacy","meaning":"外交、外交手腕","sentence":"The conflict was resolved peacefully through international diplomacy.","translation":"その紛争は国際的な外交によって平和的に解決された。"},

                {"word":"Sanction","meaning":"制裁、認可、制裁を科す","sentence":"The UN imposed economic sanctions to stop the border hostility.","translation":"国連は、国境での敵対行為を止めるために経済制裁を課した。"},
                {"word":"Sovereignty","meaning":"独立権","sentence":"The nation fought desperately to defend its territorial sovereignty.","translation":"その国家は領土の独立（主権）を守るために必死に戦った。"},
                {"word":"Globalisation","meaning":"グローバル化","sentence":"Globalisation has changed how local businesses handle commerce.","translation":"グローバル化（世界一体化）は、地元の企業が商業を扱う方法を変えた。"},
                {"word":"Migration","meaning":"移住、渡り（鳥などの）","sentence":"The study analyzed patterns of human migration across continents.","translation":"その研究は大陸を越えた人類の移住のパターンを分析した。"},

                {"word":"Margin","meaning":"差、余白、マージン","sentence":"Our team won the national match by a small margin.","translation":"私たちのチームは僅かな差（マージン）で全国大会に勝利した。"},
                {"word":"Gap","meaning":"隔たり、隙間、ギャップ","sentence":"There is a wide digital gap between generations today.","translation":"今日、世代間に大きなデジタル上の隔たり（ギャップ）がある。"},
                {"word":"Outcome","meaning":"結果、成果","sentence":"The ultimate outcome of the conference was a peace treaty.","translation":"会議の最終的な結果（成果）は平和条約だった。"},
                {"word":"Consequence","meaning":"必然の結果、重要性","sentence":"Rising sea level is an inevitable consequence of global warming.","translation":"海面の上昇は地球温暖化の避けられない結果だ。"},
                {"word":"Effect","meaning":"効果、影響、結果","sentence":"Daily reviews have a significant effect on exam scores.","translation":"毎日の復習は試験の得点に著しい効果（影響）をもたらす。"},
                {"word":"Impact","meaning":"強い影響、衝撃、衝突","sentence":"The internet had an enormous impact on international commerce.","translation":"インターネットは国際商業に莫大な影響を与えた。"},
                {"word":"Influence","meaning":"影響、及ぼす","sentence":"My biology teacher had a profound influence on my career.","translation":"生物学の先生は私のキャリア選択に深い影響を与えた。"},
                {"word":"Reaction","meaning":"反応、反動、反発","sentence":"The chemical reaction produced a substantial amount of heat.","translation":"その化学反応はかなりの量の熱を生み出した。"},
                {"word":"Response","meaning":"応答、反応、返答","sentence":"We received an immediate response to our database inquiry.","translation":"私たちはデータベースへの問い合わせに対して即座の返答（反応）を受け取った。"},
                {"word":"Feedback","meaning":"評価、フィードバック、意見","sentence":"Positive feedback from users boosted our motivation.","translation":"ユーザーからの肯定的なフィードバック（評価意見）が私たちのやる気を高めた。"},
                {"word":"Interaction","meaning":"相互作用、交流","sentence":"The program enhances interaction between transfer students.","translation":"そのプログラムは転校生同士の交流（相互作用）を高める。"}
            ]
        };

        let currentPackKey = 'pack10';
        let words = [];
        let unclearWordMap = {};
        let playbackMode = 'all';
        let currentIndex = 0;
        let isAutoPlay = true;
        let speechRate = 1.0;
        let autoPlayInterval = 1500;
        let currentUtterance = null;
        let activeTimeout = null;
        let voices = [];
        let currentStep = 0;
        let isPlaying = false;
        let isPaused = false;

        function loadUnclearData() { try { const data = localStorage.getItem('gt_unclear_p4'); if (data) unclearWordMap = JSON.parse(data); } catch (e) {} }
        function saveUnclearData() { try { localStorage.setItem('gt_unclear_p4', JSON.stringify(unclearWordMap)); } catch (e) {} }
        function initVoices() { voices = window.speechSynthesis.getVoices(); if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); }; }
        function getVoiceForLang(langCode) { const list = voices.length > 0 ? voices : window.speechSynthesis.getVoices(); let v = list.find(x => x.lang === langCode); return v || list.find(x => x.lang.startsWith(langCode.split('-')[0])); }

        function speak(text, lang, callback) {
            window.speechSynthesis.cancel();
            if (activeTimeout) clearTimeout(activeTimeout);
            if (!text) { if (callback) callback(); return; }
            setTimeout(() => {
                const u = new SpeechSynthesisUtterance(text);
                u.rate = speechRate;
                const v = getVoiceForLang(lang);
                if (v) u.voice = v; else u.lang = lang;
                window.activeUtterance = u;
                u.onend = () => { window.activeUtterance = null; setTimeout(() => { if (callback) callback(); }, 120); };
                u.onerror = () => { window.activeUtterance = null; setTimeout(() => { if (callback) callback(); }, 120); };
                window.speechSynthesis.speak(u);
            }, 120);
        }

        function changeLearningPack() {
            stopSpeaking();
            currentPackKey = document.getElementById('select-pack').value;
            words = packs[currentPackKey] ? [...packs[currentPackKey]] : [];
            currentIndex = 0;
            playbackMode = 'all';
            updatePlayerUI();
            updateModeCounters();
            if (isAutoPlay && words.length > 0) setTimeout(() => startWordFlow(), 200);
        }

        function switchTab(tabName) {
            stopSpeaking();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-rose-50', 'text-rose-700'); b.classList.add('text-slate-600', 'hover:bg-slate-100'); });
            const active = document.getElementById(`tab-btn-${tabName}`);
            active.classList.remove('text-slate-600', 'hover:bg-slate-100'); active.classList.add('bg-rose-50', 'text-rose-700');
            if (tabName === 'list') renderWordList();
        }

        function getActiveWords() { return playbackMode === 'unclear' ? words.filter(w => unclearWordMap[w.word] === true) : words; }

        function setPlaybackMode(mode) {
            stopSpeaking();
            if (mode === 'unclear' && words.filter(w => unclearWordMap[w.word] === true).length === 0) { alert("わからない登録されている単語がありません。"); return; }
            playbackMode = mode; currentIndex = 0;
            const a = document.getElementById('mode-all-btn'), u = document.getElementById('mode-unclear-btn');
            if (mode === 'all') { a.className = "px-3 py-1 rounded-md text-xs font-semibold bg-white text-rose-600 shadow-sm"; u.className = "px-3 py-1 rounded-md text-xs font-semibold text-slate-600"; }
            else { a.className = "px-3 py-1 rounded-md text-xs font-semibold text-slate-600"; u.className = "px-3 py-1 rounded-md text-xs font-semibold bg-white text-rose-600 shadow-sm"; }
            updatePlayerUI(); updateModeCounters();
            if (isAutoPlay && words.length > 0) startWordFlow();
        }

        function updateModeCounters() {
            document.getElementById('count-all-words').innerText = words.length;
            document.getElementById('count-unclear-words').innerText = words.filter(w => unclearWordMap[w.word] === true).length;
            document.querySelectorAll('.total-count-badge').forEach(b => b.innerText = words.length);
        }

        function updatePlayerUI() {
            if (words.length === 0) return;
            const active = getActiveWords(), w = active[currentIndex];
            if (!w) { if (playbackMode === 'unclear') setPlaybackMode('all'); return; }
            document.getElementById('card-word').innerText = w.word;
            document.getElementById('card-meaning').innerText = w.meaning;
            document.getElementById('card-sentence').innerText = w.sentence || "—";
            document.getElementById('card-translation').innerText = w.translation || "—";
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${active.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / active.length) * 100}%`;
            updateUnclearCardBtn(w.word); resetSectionsVisual();
        }

        function resetSectionsVisual() { ['section-word', 'section-meaning', 'section-sentence', 'section-translation'].forEach(id => document.getElementById(id).classList.remove('speech-active-section')); }
        function highlightSection(id) { resetSectionsVisual(); document.getElementById(id).classList.add('speech-active-section'); }

        function updateUnclearCardBtn(word) {
            const isU = unclearWordMap[word] === true, b = document.getElementById('card-unclear-toggle'), i = document.getElementById('card-unclear-icon'), t = document.getElementById('card-unclear-text');
            if (isU) { i.className = "fa-solid fa-star text-amber-500"; t.innerText = "わからない登録済"; b.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-amber-200 bg-amber-50 text-amber-700 text-xs font-semibold shadow-sm"; }
            else { i.className = "fa-regular fa-star text-slate-400"; t.innerText = "わからない"; b.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-400 text-xs font-semibold shadow-sm"; }
        }

        function toggleCurrentUnclear() { const active = getActiveWords(), w = active[currentIndex]; if (!w) return; unclearWordMap[w.word] = !unclearWordMap[w.word]; saveUnclearData(); updateUnclearCardBtn(w.word); updateModeCounters(); }
        function toggleWordUnclear(word) { unclearWordMap[word] = !unclearWordMap[word]; saveUnclearData(); updateModeCounters(); const active = getActiveWords(), w = active[currentIndex]; if (w && w.word === word) updateUnclearCardBtn(word); }

        function speakCurrentPart(part) { stopSpeaking(); const active = getActiveWords(), w = active[currentIndex]; if (!w) return; setTimeout(() => { if (part === 'word') { highlightSection('section-word'); speak(w.word, 'en-US'); } else if (part === 'meaning') { highlightSection('section-meaning'); speak(w.meaning, 'ja-JP'); } else if (part === 'sentence' && w.sentence) { highlightSection('section-sentence'); speak(w.sentence, 'en-US'); } else if (part === 'translation' && w.translation) { highlightSection('section-translation'); speak(w.translation, 'ja-JP'); } }, 100); }
        function stopSpeaking() { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); isPlaying = false; isPaused = false; currentStep = 0; resetSectionsVisual(); updatePlayButtonUI(); }
        function pauseSpeaking() { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); isPaused = true; updatePlayButtonUI(); }

        function togglePlayPause() { if (words.length === 0) return; if (!isPlaying) startWordFlow(); else if (isPaused) { isPaused = false; updatePlayButtonUI(); playStep(); } else pauseSpeaking(); }

        function updatePlayButtonUI() {
            const b = document.getElementById('btn-play-all'); if (!b) return;
            if (!isPlaying) b.innerHTML = `<i class="fa-solid fa-play"></i><span>再生</span>`;
            else if (isPaused) b.innerHTML = `<i class="fa-solid fa-play"></i><span>再開</span>`;
            else b.innerHTML = `<i class="fa-solid fa-pause"></i><span>停止</span>`;
        }

        function startWordFlow() { if (words.length === 0) return; stopSpeaking(); isPlaying = true; isPaused = false; currentStep = 0; playStep(); }

        function playStep() {
            if (!isPlaying || isPaused) return; const active = getActiveWords(), w = active[currentIndex]; if (!w) return;
            let text = "", lang = "", id = "", delay = 1000;
            switch (currentStep) {
                case 0: text = w.word; lang = 'en-US'; id = 'section-word'; delay = 800; break;
                case 1: text = w.meaning; lang = 'ja-JP'; id = 'section-meaning'; delay = w.sentence ? 1000 : autoPlayInterval; break;
                case 2: text = w.sentence; lang = 'en-US'; id = 'section-sentence'; delay = 800; break;
                case 3: text = w.translation; lang = 'ja-JP'; id = 'section-translation'; delay = autoPlayInterval; break;
            }
            if(!text) {
                if (currentStep < 3) { currentStep++; playStep(); }
                else { currentStep = 0; if (isAutoPlay) { nextWord(true); isPlaying = true; playStep(); } else stopSpeaking(); }
                return;
            }

            highlightSection(id); updatePlayButtonUI();
            speak(text, lang, () => {
                if (!isPlaying || isPaused) return;
                activeTimeout = setTimeout(() => {
                    if (currentStep < 3) { currentStep++; playStep(); }
                    else { currentStep = 0; if (isAutoPlay) { nextWord(true); isPlaying = true; playStep(); } else { stopSpeaking(); } }
                }, delay);
            });
        }

        function toggleAutoPlay() {
            isAutoPlay = !isAutoPlay; const b = document.getElementById('btn-autoplay'), d = document.getElementById('status-dot'), p = document.getElementById('ping-indicator'), t = document.getElementById('text-autoplay');
            if (isAutoPlay) { b.className = "px-4 py-1.5 rounded-xl text-sm font-semibold border border-rose-200 bg-rose-50 text-rose-800 flex items-center gap-2"; d.className = "relative inline-flex rounded-full h-3.5 w-3.5 bg-rose-500"; p.classList.remove('hidden'); t.innerText = "自動再生 ON"; if(words.length > 0) startWordFlow(); }
            else { b.className = "px-4 py-1.5 rounded-xl text-sm font-semibold border border-slate-200 bg-white text-slate-700 flex items-center gap-2"; d.className = "relative inline-flex rounded-full h-3.5 w-3.5 bg-slate-300"; p.classList.add('hidden'); t.innerText = "自動再生 OFF"; stopSpeaking(); }
        }

        function prevWord() { stopSpeaking(); const active = getActiveWords(); if (active.length === 0) return; currentIndex = currentIndex > 0 ? currentIndex - 1 : active.length - 1; updatePlayerUI(); if (isAutoPlay) setTimeout(() => startWordFlow(), 150); }
        function nextWord(keep = false) { if (!keep) stopSpeaking(); else { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); currentStep = 0; } const active = getActiveWords(); if (active.length === 0) return; currentIndex = currentIndex < active.length - 1 ? currentIndex + 1 : 0; updatePlayerUI(); }
        function changeRate() { speechRate = parseFloat(document.getElementById('select-rate').value); }
        function changeInterval() { autoPlayInterval = parseInt(document.getElementById('select-interval').value); }

        function renderWordList() {
            const tbody = document.getElementById('word-table-body'); tbody.innerHTML = '';
            if (words.length === 0) return;
            words.forEach((w, idx) => {
                const isU = unclearWordMap[w.word] === true, tr = document.createElement('tr');
                tr.className = `hover:bg-rose-50/40 cursor-pointer ${currentIndex === idx && playbackMode === 'all' ? 'bg-rose-50/70 font-bold' : ''}`;
                tr.onclick = (e) => { if (e.target.closest('.unclear-checkbox')) return; playbackMode = 'all'; currentIndex = idx; switchTab('player'); updatePlayerUI(); setTimeout(() => startWordFlow(), 150); };
                tr.innerHTML = `<td class="py-3 px-4 text-center"><input type="checkbox" ${isU?'checked':''} onchange="toggleWordUnclear('${w.word}')" class="unclear-checkbox w-5 h-5 text-rose-600 rounded"></td><td class="py-3 px-4 font-mono text-xs">${idx+1}</td><td class="py-3 px-4 font-bold text-rose-700">${w.word}</td><td class="py-3 px-4">${w.meaning}</td><td class="py-3 px-4 hidden md:table-cell truncate max-w-xs">${w.sentence || ''}</td>`;
                tbody.appendChild(tr);
            });
        }

        function startApp() {
            try { const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u); setTimeout(() => window.speechSynthesis.cancel(), 80); } catch(e) {}
            document.getElementById('start-overlay').style.display = 'none';
            words = packs[currentPackKey] ? [...packs[currentPackKey]] : [];
            updatePlayerUI(); updateModeCounters();
        }

        window.onload = () => { initVoices(); loadUnclearData(); };
    </script>
</body>
</html>
