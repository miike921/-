<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Word Trainer Part 2 (301-600語)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Comfortaa', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .speech-active-section { border-color: #4f46e5 !important; background-color: rgba(79, 70, 229, 0.05) !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.08); transform: scale(1.01); }
        button, select { min-height: 46px; }
        #start-overlay { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #10b981 0%, #059669 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; padding: 2rem; }
        #start-btn { background: white; color: #059669; font-weight: 700; font-size: 1.15rem; padding: 1.1rem 3rem; border-radius: 1rem; box-shadow: 0 8px 32px rgba(0,0,0,0.25); border: none; cursor: pointer; min-height: 60px; transition: transform 0.1s; }
        #start-btn:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-height-screen flex flex-col justify-between text-slate-800">

    <div id="start-overlay">
        <div style="text-align:center;">
            <div style="width:88px;height:88px;background:rgba(255,255,255,0.2);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
                <i class="fa-solid fa-book-open" style="font-size:2.5rem;color:white;"></i>
            </div>
            <h1 class="logo-font" style="font-size:2rem;font-weight:700;color:white;margin-bottom:0.3rem;">Word Trainer</h1>
            <p style="color:rgba(167,243,208,1);font-size:0.9rem;">Part 2: 共通テスト必須 No.4〜6</p>
        </div>
        <button id="start-btn" onclick="startApp()"><i class="fa-solid fa-play" style="margin-right:0.6rem;"></i>タップして開始</button>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col lg:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-600 text-white p-2 rounded-xl shadow-md"><i class="fa-solid fa-book-open text-xl"></i></div>
                <div><h1 class="text-lg font-bold text-slate-900 logo-font">Gemini Word Trainer</h1><p class="text-[10px] text-slate-500 font-semibold">Part 2 (No.4〜6 収録)</p></div>
            </div>
            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl w-full lg:w-auto">
                <span class="text-xs font-bold text-slate-500 px-2 hidden sm:inline">教材:</span>
                <select id="select-pack" onchange="changeLearningPack()" class="bg-white border-0 text-slate-800 font-bold text-sm py-1.5 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm w-full lg:w-auto">
                    <option value="pack4" selected>No.4 論理展開・読解必須</option>
                    <option value="pack5">No.5 社会・日常生活</option>
                    <option value="pack6">No.6 サイエンス・環境</option>
                </select>
            </div>
            <div class="flex gap-2 w-full lg:w-auto justify-end">
                <button onclick="switchTab('player')" id="tab-btn-player" class="tab-btn flex-1 lg:flex-none px-4 py-2 rounded-lg text-sm font-semibold transition bg-emerald-50 text-emerald-700"><i class="fa-solid fa-play mr-1.5"></i>プレーヤー</button>
                <button onclick="switchTab('list')" id="tab-btn-list" class="tab-btn flex-1 lg:flex-none px-4 py-2 rounded-lg text-sm font-semibold transition text-slate-600 hover:bg-slate-100"><i class="fa-solid fa-list mr-1.5"></i>一覧 (<span class="total-count-badge">0</span>)</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto p-4 flex flex-col justify-center">
        <!-- プレーヤータブ -->
        <div id="tab-player" class="tab-content block space-y-6">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-3">
                <div class="flex flex-col sm:flex-row justify-between gap-3 pb-2 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <div class="inline-flex rounded-lg p-1 bg-slate-100">
                            <button id="mode-all-btn" onclick="setPlaybackMode('all')" class="px-3 py-1 rounded-md text-xs font-semibold bg-white text-emerald-600 shadow-sm">全単語 (<span id="count-all-words">0</span>)</button>
                            <button id="mode-unclear-btn" onclick="setPlaybackMode('unclear')" class="px-3 py-1 rounded-md text-xs font-semibold text-slate-600">わからない (<span id="count-unclear-words">0</span>)</button>
                        </div>
                    </div>
                    <span id="progress-text" class="text-sm font-bold text-slate-700">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div id="progress-bar" class="bg-emerald-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-md p-6 sm:p-10 relative overflow-hidden min-h-[440px] flex flex-col justify-between">
                <div class="absolute top-4 right-4 z-20">
                    <button id="card-unclear-toggle" onclick="toggleCurrentUnclear()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-400 font-semibold text-xs shadow-sm"><i class="fa-regular fa-star text-sm" id="card-unclear-icon"></i><span id="card-unclear-text">わからない</span></button>
                </div>

                <div class="space-y-3.5 z-10 mt-6" id="card-content-area">
                    <div id="section-word" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2.5 py-0.5 rounded-full">Step 1: Word</span><button onclick="speakCurrentPart('word')" class="text-indigo-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <h2 id="card-word" class="text-3xl sm:text-4xl font-extrabold text-slate-950">Loading...</h2>
                    </div>
                    <div id="section-meaning" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2.5 py-0.5 rounded-full">Step 2: Meaning</span><button onclick="speakCurrentPart('meaning')" class="text-rose-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <p id="card-meaning" class="text-lg sm:text-xl font-bold text-slate-850">—</p>
                    </div>
                    <div id="section-sentence" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-teal-500 bg-teal-50 px-2.5 py-0.5 rounded-full">Step 3: Example</span><button onclick="speakCurrentPart('sentence')" class="text-teal-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <p id="card-sentence" class="text-base sm:text-lg font-medium text-slate-700 italic">—</p>
                    </div>
                    <div id="section-translation" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-amber-500 bg-amber-50 px-2.5 py-0.5 rounded-full">Step 4: Translation</span><button onclick="speakCurrentPart('translation')" class="text-amber-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <p id="card-translation" class="text-sm sm:text-base font-normal text-slate-600">—</p>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-8 pt-6 border-t border-slate-100 z-10">
                    <div class="flex items-center gap-3">
                        <button id="btn-autoplay" onclick="toggleAutoPlay()" class="px-4 py-1.5 rounded-xl text-sm font-semibold border border-emerald-200 bg-emerald-50 text-emerald-800 shadow-sm flex items-center gap-2"><span class="relative flex h-3.5 w-3.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75" id="ping-indicator"></span><span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-emerald-500" id="status-dot"></span></span><span id="text-autoplay">自動再生 ON</span></button>
                        <select id="select-interval" onchange="changeInterval()" class="bg-transparent border-b border-slate-300 text-slate-600 text-xs py-0.5"><option value="1500" selected>短め</option><option value="2500">普通</option><option value="4000">長め</option></select>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="prevWord()" class="w-12 h-12 rounded-full border border-slate-200 bg-white flex justify-center items-center shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                        <button id="btn-play-all" onclick="togglePlayPause()" class="px-8 h-12 rounded-full bg-emerald-600 text-white font-bold shadow-md flex items-center gap-2"><i class="fa-solid fa-play"></i><span id="text-play-all">再生</span></button>
                        <button onclick="nextWord()" class="w-12 h-12 rounded-full border border-slate-200 bg-white flex justify-center items-center shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <select id="select-rate" onchange="changeRate()" class="bg-transparent border-b border-slate-300 text-slate-600 text-xs py-0.5"><option value="0.8">0.8x</option><option value="1.0" selected>1.0x</option><option value="1.2">1.2x</option></select>
                </div>
            </div>
        </div>

        <!-- 一覧タブ -->
        <div id="tab-list" class="tab-content hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto max-h-[500px]">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500"><th class="py-3 px-4 w-16 text-center">マーク</th><th class="py-3 px-4 w-16">No.</th><th class="py-3 px-4">英単語</th><th class="py-3 px-4">意味</th><th class="py-3 px-4 hidden md:table-cell">例文</th></tr></thead>
                        <tbody id="word-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const packs = {
            pack4: [
                {"word": "Furthermore", "meaning": "さらに、その上", "sentence": "Furthermore, the survey indicates a shift in youth lifestyle.", "translation": "さらに、調査は若者のライフスタイルの変化を示している。"},
                {"word": "Therefore", "meaning": "したがって、それゆえに", "sentence": "Therefore, we must find an alternative solution immediately.", "translation": "したがって、私たちはすぐに代替の解決策を見つけなければならない。"},
                {"word": "In contrast", "meaning": "対照的に", "sentence": "In contrast, the second group showed no significant change.", "translation": "対照的に、第二のグループは著しい変化を示さなかった。"},
                {"word": "Consequently", "meaning": "その結果として", "sentence": "Consequently, many local schools decided to adapt the system.", "translation": "その結果として、多くの地方の学校がそのシステムを採用することに決めた。"},
                {"word": "Nevertheless", "meaning": "それにもかかわらず", "sentence": "Nevertheless, they continued the research under tight budgets.", "translation": "それにもかかわらず、彼らは厳しい予算の中で研究を続けた。"},
                {"word": "Moreover", "meaning": "その上、さらに", "sentence": "Moreover, the application process has become much simpler.", "translation": "その上、申請手続きはずっと簡単になった。"},
                {"word": "Simultaneously", "meaning": "同時に、一斉に", "sentence": "The two experiments were conducted simultaneously in different labs.", "translation": "その2つの実験は異なる研究室で同時に行われた。"},
                {"word": "Otherwise", "meaning": "さもなければ、その他の点では", "sentence": "We need to hurry, otherwise we will miss the orientation.", "translation": "急がなければならない、さもなければオリエンテーションに遅れてしまう。"},
                {"word": "Hence", "meaning": "したがって、それゆえに", "sentence": "The cost of transport rose, hence the increase in prices.", "translation": "輸送コストが上昇した、それゆえに物価が上昇した。"},
                {"word": "Nonetheless", "meaning": "それにもかかわらず", "sentence": "The test was highly complex; nonetheless, she achieved a top score.", "translation": "テストは非常に複雑だったが、それにもかかわらず彼女は最高点を出した。"},
                {"word": "Accurate", "meaning": "正確な、事実に基づいた", "sentence": "The software provides accurate data about weather patterns.", "translation": "そのソフトウェアは気象パターンに関する正確なデータを提供する。"},
                {"word": "Sufficient", "meaning": "十分な、足りる", "sentence": "We have sufficient evidence to support our primary theory.", "translation": "私たちの主要な理論を支持する十分な証拠がある。"},
                {"word": "Inadequate", "meaning": "不十分な、不適切な", "sentence": "The library funding was inadequate to buy new digital books.", "translation": "新しいデジタル本を購入するには図書館の資金が不十分だった。"},
                {"word": "Primary", "meaning": "主要な、初等的な", "sentence": "Our primary objective is to improve students' listening skills.", "translation": "私たちの主要な目的は生徒のリスニング力を向上させることだ。"},
                {"word": "Secondary", "meaning": "二次的な、補助的な", "sentence": "That issue is of secondary importance in this presentation.", "translation": "その問題はこのプレゼンテーションにおいて二次的な重要性のものだ。"},
                {"word": "Essential", "meaning": "不可欠な、本質的な", "sentence": "Daily review is essential for mastering foreign vocabulary.", "translation": "外国語の語彙をマスターするためには毎日の復習が不可欠だ。"},
                {"word": "Crucial", "meaning": "決定的な、極めて重要な", "sentence": "The final five minutes of the exam are crucial for checking mistakes.", "translation": "試験の最後の5分間は間違いを確認するために極めて重要だ。"},
                {"word": "Vital", "meaning": "極めて重要な、生命の", "sentence": "Fresh water plays a vital role in maintaining regional health.", "translation": "淡水は地域の健康を維持するために極めて重要な役割を果たしている。"},
                {"word": "Significant", "meaning": "重要な、著しい", "sentence": "There is a significant difference between the two academic options.", "translation": "その2つの学問的選択肢の間には著しい違いがある。"},
                {"word": "Trivial", "meaning": "些細な、取るに足りない", "sentence": "Do not waste your valuable study time on trivial matters.", "translation": "些細なことに貴重な勉強時間を無駄にしてはいけない。"},
                {"word": "Definite", "meaning": "明確な、確実な", "sentence": "The school schedule remains subject to definite confirmation.", "translation": "学校のスケジュールは確実な確認を必要とする状態だ。"},
                {"word": "Vague", "meaning": "曖昧な、漠然とした", "sentence": "His explanation about the project timeline was completely vague.", "translation": "プロジェクトのタイムラインに関する彼の説明は完全に曖昧だった。"},
                {"word": "Obvious", "meaning": "明らかな、明白な", "sentence": "It was obvious that the system needed an immediate upgrade.", "translation": "システムに即座のアップグレードが必要なことは明らかだった。"},
                {"word": "Apparent", "meaning": "明白な、一見〜らしい", "sentence": "For no apparent reason, the online server stopped working.", "translation": "明白な理由なしに、オンラインサーバーが停止した。"},
                {"word": "Evident", "meaning": "明白な、証拠がはっきりした", "sentence": "The benefits of regular physical exercise are evident to doctors.", "translation": "定期的な身体運動の恩恵は医師にとって明白だ。"},
                {"word": "Explicit", "meaning": "明確な、はっきり述べられた", "sentence": "The teacher gave explicit instructions on how to write the essay.", "translation": "先生はエッセイの書き方について明確な指示を与えた。"},
                {"word": "Implicit", "meaning": "暗黙の、含まれた", "sentence": "There was an implicit agreement that everyone would participate.", "translation": "全員が参加するという暗黙の了解があった。"},
                {"word": "Logical", "meaning": "論理的な、筋の通った", "sentence": "Please organize your arguments in a logical sequence.", "translation": "あなたの主張を論理的な順序で整理してください。"},
                {"word": "Rational", "meaning": "合理的な、理性を備えた", "sentence": "We need to make a rational choice based on statistical facts.", "translation": "私たちは統計的事実に基づいて合理的な選択をする必要がある。"},
                {"word": "Objective", "meaning": "客観的な、目的", "sentence": "The committee aims to provide an objective evaluation of the data.", "translation": "委員会はデータの客観的な評価を提供することを目指している。"},
                {"word": "Subjective", "meaning": "主観的な", "sentence": "Beauty is highly subjective and varies from person to person.", "translation": "美しさは非常に主観的なものであり、人によって異なる。"},
                {"word": "Relative", "meaning": "相対的な、親戚", "sentence": "The relative advantage of online lectures is flexibility.", "translation": "オンライン講義の相対的な利点は柔軟性だ。"},
                {"word": "Absolute", "meaning": "絶対的な、完全な", "sentence": "There is no absolute guarantee that prices will remain stable.", "translation": "価格が安定したままであるという絶対的な保証はない。"},
                {"word": "Relevant", "meaning": "関連のある、適切な", "sentence": "Please include only the relevant data in your final summary.", "translation": "最終的な要約には関連のあるデータのみを含めてください。"},
                {"word": "Irrelevant", "meaning": "無関係な、見当違いの", "sentence": "His comment during the debate was completely irrelevant to the topic.", "translation": "ディベート中の彼のコメントはトピックに完全に無関係だった。"},
                {"word": "Specific", "meaning": "特定の、具体的な", "sentence": "Could you provide a specific example of this cultural shift?", "translation": "この文化的変化の具体的な例を挙げていただけますか？"},
                {"word": "General", "meaning": "一般的な、大まかな", "sentence": "The textbook provides a general overview of world history.", "translation": "その教科書は世界史の一般的な概観を提供している。"},
                {"word": "Concrete", "meaning": "具体的な、コンクリート製の", "sentence": "The council proposed a concrete plan to reduce traffic pollution.", "translation": "議会は交通汚染を削減するための具体的な計画を提案した。"},
                {"word": "Abstract", "meaning": "抽象的な、要約", "sentence": "The concept of absolute justice is too abstract for young children.", "translation": "絶対的な正義という概念は幼い子供には抽象的すぎる。"},
                {"word": "Appropriate", "meaning": "適切な、ふさわしい", "sentence": "Casual clothes are appropriate for the school volunteer event.", "translation": "学校のボランティアイベントにはカジュアルな服装が適切だ。"},
                {"word": "Inappropriate", "meaning": "不適切な、ふさわしくない", "sentence": "Using mobile phones during the formal examination is inappropriate.", "translation": "公式な試験中に携帯電話を使用することは不適切だ。"},
                {"word": "Consistent", "meaning": "一貫した、矛盾のない", "sentence": "His test results are consistent with his high daily effort.", "translation": "彼のテスト結果は彼の高い毎日の努力と一貫している。"},
                {"word": "Contradictory", "meaning": "矛盾した、反対の", "sentence": "The witness gave contradictory statements to the local police.", "translation": "目撃者は地元の警察に矛盾した供述をした。"},
                {"word": "Valid", "meaning": "妥当な、有効な", "sentence": "You must present a valid student ID card at the entrance.", "translation": "入り口で有効な学生証を提示しなければならない。"},
                {"word": "Invalid", "meaning": "無効な、根拠の薄い", "sentence": "The conclusion was invalid because the sample size was too small.", "translation": "サンプルサイズが小さすぎたため、その結論は無効だった。"},
                {"word": "Plausible", "meaning": "もっともらしい、妥当そうな", "sentence": "The scientist offered a plausible explanation for the anomaly.", "translation": "科学者はその異常現象についてもっともらしい説明を提示した。"},
                {"word": "Hypothetical", "meaning": "仮定の、仮説に基づいた", "sentence": "Let's consider a hypothetical situation where resources are limited.", "translation": "資源が限られているという仮定の状況を考えてみよう。"},
                {"word": "Inherent", "meaning": "固有の、本来備わっている", "sentence": "There are inherent risks involved in any space exploration project.", "translation": "いかなる宇宙探査プロジェクトにも固有のリスクが含まれている。"},
                {"word": "Intrinsic", "meaning": "本来備わっている、本質的な", "sentence": "The intrinsic value of education goes beyond passing exams.", "translation": "教育の本質的な価値は試験に合格することを超える。"},
                {"word": "Extrinsic", "meaning": "外的な、付随的な", "sentence": "Extrinsic rewards like high prizes can motivate short-term work.", "translation": "高い賞品のような外的な報酬は短期的な労働の動機付けになり得る。"},
                {"word": "Dominant", "meaning": "支配的な、最も有力な", "sentence": "The dominant feature of this region is its massive mountain range.", "translation": "この地域の最も有力な特徴はその巨大な山脈だ。"},
                {"word": "Subordinate", "meaning": "下位の、従属する", "sentence": "In this business structure, marketing is subordinate to research.", "translation": "このビジネス構造では、マーケティングは研究の下位に位置する。"},

                {"word": "Influence", "meaning": "影響、及ぼす", "sentence": "The environment has a profound influence on an organism's growth.", "translation": "環境は生物の成長に深い影響を与える。"},
                {"word": "Reaction", "meaning": "反応、反発", "sentence": "The chemical reaction caused a sudden change in temperature.", "translation": "その化学反応は急激な温度変化を引き起こした。"},
                {"word": "Response", "meaning": "反応、応答、返答", "sentence": "The plant's response to sunlight was observed over three weeks.", "translation": "太陽光に対する植物の反応が3週間にわたって観察された。"},
                {"word": "Behavior", "meaning": "行動、ふるまい、挙動", "sentence": "Students are asked to observe the behavior of the birds.", "translation": "生徒たちは鳥の行動（挙動）を観察するように求められている。"},
                {"word": "Mechanism", "meaning": "仕組み、メカニズム、装置", "sentence": "Scientists are studying the exact mechanism of virus transmission.", "translation": "科学者たちはウイルス伝播の正確な仕組みを研究している。"},
                {"word": "Process", "meaning": "過程、プロセス、加工する", "sentence": "Language learning is a gradual process that takes constant effort.", "translation": "言語学習は絶え間ない努力を必要とする緩やかな過程だ。"},
                {"word": "Procedure", "meaning": "手続き、手順、処置", "sentence": "Please follow the standard safety procedure during the experiment.", "translation": "実験中は標準的な安全手順に従ってください。"},
                {"word": "Method", "meaning": "方法、手法", "sentence": "The speaker introduced an alternative method for vocabulary review.", "translation": "スピーカーは語彙復習のための代替の手法を紹介した。"},
                {"word": "Technique", "meaning": "技術、手法、テクニック", "sentence": "The surgeon demonstrated a highly advanced technique to the students.", "translation": "外科医は非常に高度な技術を生徒たちに実演した。"},
                {"word": "Approach", "meaning": "アプローチ、接近", "sentence": "We should try a different approach to solve this ecological dilemma.", "translation": "この生態学的なジレンマを解決するために別のアプローチを試すべきだ。"},
                {"word": "Strategy", "meaning": "戦略、方策", "sentence": "Adopting a pragmatic strategy is key to reducing resource waste.", "translation": "現実主義的な戦略を採用することが資源の無駄を削減する鍵だ。"},
                {"word": "System", "meaning": "体系、システム", "sentence": "The computer system detects unauthorized network access instantly.", "translation": "コンピューターシステムは権限のないネットワークアクセスを即座に検出する。"},
                {"word": "Network", "meaning": "ネットワーク、網状組織", "sentence": "The institute has a global network of scientific researchers.", "translation": "その研究所は科学研究者のグローバルなネットワークを持っている。"},
                {"word": "Structure", "meaning": "構造", "sentence": "The course analyzes the complex structure of chemical entities.", "translation": "そのコースは化学的実体の複雑な構造を分析する。"},
                {"word": "Function", "meaning": "機能、機能する", "sentence": "The primary function of the device is to measure air pollution.", "translation": "その機器の主要な機能は大気汚染を測定することだ。"},
                {"word": "Operation", "meaning": "操作、稼働、手術", "sentence": "The factory suspended its operation due to the electricity deficit.", "translation": "工場は電力不足（赤字）のため稼働を停止した。"},
                {"word": "Performance", "meaning": "性能、実績、演奏", "sentence": "The hardware performance exceeded all our original expectations.", "translation": "そのハードウェアの性能は私たちのすべての元の期待を上回った。"},
                {"word": "Capacity", "meaning": "容量、能力、収容力", "sentence": "The machine has an enormous capacity to refine raw materials.", "translation": "その機械には原材料を精製する莫大な能力がある。"},
                {"word": "Capability", "meaning": "能力、素質", "sentence": "The satellite has the capability to detect slight weather shifts.", "translation": "その衛星はわずかな天候の変化を検出する能力を持っている。"},
                {"word": "Potential", "meaning": "潜在能力、可能性", "sentence": "The research team realized the full potential of the innovation.", "translation": "研究チームはその革新のすべての潜在能力（可能性）を理解した。"},
                {"word": "Property", "meaning": "特性、財産", "sentence": "The element has a unique property that converts heat to power.", "translation": "その元素は熱を電力に変換する独自の特性を持っている。"},
                {"word": "Characteristic", "meaning": "特徴、特性、特徴的な", "sentence": "Genetic variation is a basic characteristic of all living species.", "translation": "遺伝的変異はすべての生きている「種」の基本的な特徴だ。"},
                {"word": "Feature", "meaning": "特徴、主要な点", "sentence": "The dominant feature of the textbook is its dynamic illustrations.", "translation": "その教科書の主要な特徴はその鮮明なイラストだ。"},
                {"word": "Attribute", "meaning": "属性、特質、〜に帰する", "sentence": "Scientists attribute the anomaly to a sudden shift in ocean currents.", "translation": "科学者たちはその異常現象を海流の突然の変化に帰している（原因だとしている）。"}
            ]
        };

        let currentPackKey = 'pack4';
        let words = [];
        let unclearWordMap = {};
        let playbackMode = 'all';
        let currentIndex = 0;
        let isAutoPlay = true;
        let speechRate = 1.0;
        let autoPlayInterval = 1500;
        let currentUtterance = null;
        let activeTimeout = null;
        let voices = [];
        let currentStep = 0;
        let isPlaying = false;
        let isPaused = false;

        function loadUnclearData() { try { const data = localStorage.getItem('gt_unclear_p2'); if (data) unclearWordMap = JSON.parse(data); } catch (e) {} }
        function saveUnclearData() { try { localStorage.setItem('gt_unclear_p2', JSON.stringify(unclearWordMap)); } catch (e) {} }
        function initVoices() { voices = window.speechSynthesis.getVoices(); if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); }; }
        function getVoiceForLang(langCode) { const list = voices.length > 0 ? voices : window.speechSynthesis.getVoices(); let v = list.find(x => x.lang === langCode); return v || list.find(x => x.lang.startsWith(langCode.split('-')[0])); }

        function speak(text, lang, callback) {
            window.speechSynthesis.cancel();
            if (activeTimeout) clearTimeout(activeTimeout);
            if (!text) { if (callback) callback(); return; }
            setTimeout(() => {
                const u = new SpeechSynthesisUtterance(text);
                u.rate = speechRate;
                const v = getVoiceForLang(lang);
                if (v) u.voice = v; else u.lang = lang;
                window.activeUtterance = u;
                u.onend = () => { window.activeUtterance = null; setTimeout(() => { if (callback) callback(); }, 120); };
                u.onerror = () => { window.activeUtterance = null; setTimeout(() => { if (callback) callback(); }, 120); };
                window.speechSynthesis.speak(u);
            }, 120);
        }

        function changeLearningPack() {
            stopSpeaking();
            currentPackKey = document.getElementById('select-pack').value;
            words = packs[currentPackKey] ? [...packs[currentPackKey]] : [];
            currentIndex = 0;
            playbackMode = 'all';
            updatePlayerUI();
            updateModeCounters();
            if (isAutoPlay && words.length > 0) setTimeout(() => startWordFlow(), 200);
        }

        function switchTab(tabName) {
            stopSpeaking();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-emerald-50', 'text-emerald-700'); b.classList.add('text-slate-600', 'hover:bg-slate-100'); });
            const active = document.getElementById(`tab-btn-${tabName}`);
            active.classList.remove('text-slate-600', 'hover:bg-slate-100'); active.classList.add('bg-emerald-50', 'text-emerald-700');
            if (tabName === 'list') renderWordList();
        }

        function getActiveWords() { return playbackMode === 'unclear' ? words.filter(w => unclearWordMap[w.word] === true) : words; }

        function setPlaybackMode(mode) {
            stopSpeaking();
            if (mode === 'unclear' && words.filter(w => unclearWordMap[w.word] === true).length === 0) { alert("わからない登録されている単語がありません。"); return; }
            playbackMode = mode; currentIndex = 0;
            const a = document.getElementById('mode-all-btn'), u = document.getElementById('mode-unclear-btn');
            if (mode === 'all') { a.className = "px-3 py-1 rounded-md text-xs font-semibold bg-white text-emerald-600 shadow-sm"; u.className = "px-3 py-1 rounded-md text-xs font-semibold text-slate-600"; }
            else { a.className = "px-3 py-1 rounded-md text-xs font-semibold text-slate-600"; u.className = "px-3 py-1 rounded-md text-xs font-semibold bg-white text-emerald-600 shadow-sm"; }
            updatePlayerUI(); updateModeCounters();
            if (isAutoPlay && words.length > 0) startWordFlow();
        }

        function updateModeCounters() {
            document.getElementById('count-all-words').innerText = words.length;
            document.getElementById('count-unclear-words').innerText = words.filter(w => unclearWordMap[w.word] === true).length;
            document.querySelectorAll('.total-count-badge').forEach(b => b.innerText = words.length);
        }

        function updatePlayerUI() {
            if (words.length === 0) return;
            const active = getActiveWords(), w = active[currentIndex];
            if (!w) { if (playbackMode === 'unclear') setPlaybackMode('all'); return; }
            document.getElementById('card-word').innerText = w.word;
            document.getElementById('card-meaning').innerText = w.meaning;
            document.getElementById('card-sentence').innerText = w.sentence || "—";
            document.getElementById('card-translation').innerText = w.translation || "—";
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${active.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / active.length) * 100}%`;
            updateUnclearCardBtn(w.word); resetSectionsVisual();
        }

        function resetSectionsVisual() { ['section-word', 'section-meaning', 'section-sentence', 'section-translation'].forEach(id => document.getElementById(id).classList.remove('speech-active-section')); }
        function highlightSection(id) { resetSectionsVisual(); document.getElementById(id).classList.add('speech-active-section'); }

        function updateUnclearCardBtn(word) {
            const isU = unclearWordMap[word] === true, b = document.getElementById('card-unclear-toggle'), i = document.getElementById('card-unclear-icon'), t = document.getElementById('card-unclear-text');
            if (isU) { i.className = "fa-solid fa-star text-amber-500"; t.innerText = "わからない登録済"; b.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-amber-200 bg-amber-50 text-amber-700 text-xs font-semibold shadow-sm"; }
            else { i.className = "fa-regular fa-star text-slate-400"; t.innerText = "わからない"; b.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-400 text-xs font-semibold shadow-sm"; }
        }

        function toggleCurrentUnclear() { const active = getActiveWords(), w = active[currentIndex]; if (!w) return; unclearWordMap[w.word] = !unclearWordMap[w.word]; saveUnclearData(); updateUnclearCardBtn(w.word); updateModeCounters(); }
        function toggleWordUnclear(word) { unclearWordMap[word] = !unclearWordMap[word]; saveUnclearData(); updateModeCounters(); const active = getActiveWords(), w = active[currentIndex]; if (w && w.word === word) updateUnclearCardBtn(word); }

        function speakCurrentPart(part) { stopSpeaking(); const active = getActiveWords(), w = active[currentIndex]; if (!w) return; setTimeout(() => { if (part === 'word') { highlightSection('section-word'); speak(w.word, 'en-US'); } else if (part === 'meaning') { highlightSection('section-meaning'); speak(w.meaning, 'ja-JP'); } else if (part === 'sentence' && w.sentence) { highlightSection('section-sentence'); speak(w.sentence, 'en-US'); } else if (part === 'translation' && w.translation) { highlightSection('section-translation'); speak(w.translation, 'ja-JP'); } }, 100); }
        function stopSpeaking() { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); isPlaying = false; isPaused = false; currentStep = 0; resetSectionsVisual(); updatePlayButtonUI(); }
        function pauseSpeaking() { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); isPaused = true; updatePlayButtonUI(); }

        function togglePlayPause() { if (words.length === 0) return; if (!isPlaying) startWordFlow(); else if (isPaused) { isPaused = false; updatePlayButtonUI(); playStep(); } else pauseSpeaking(); }

        function updatePlayButtonUI() {
            const b = document.getElementById('btn-play-all'); if (!b) return;
            if (!isPlaying) b.innerHTML = `<i class="fa-solid fa-play"></i><span>再生</span>`;
            else if (isPaused) b.innerHTML = `<i class="fa-solid fa-play"></i><span>再開</span>`;
            else b.innerHTML = `<i class="fa-solid fa-pause"></i><span>停止</span>`;
        }

        function startWordFlow() { if (words.length === 0) return; stopSpeaking(); isPlaying = true; isPaused = false; currentStep = 0; playStep(); }

        function playStep() {
            if (!isPlaying || isPaused) return; const active = getActiveWords(), w = active[currentIndex]; if (!w) return;
            let text = "", lang = "", id = "", delay = 1000;
            switch (currentStep) {
                case 0: text = w.word; lang = 'en-US'; id = 'section-word'; delay = 800; break;
                case 1: text = w.meaning; lang = 'ja-JP'; id = 'section-meaning'; delay = w.sentence ? 1000 : autoPlayInterval; break;
                case 2: text = w.sentence; lang = 'en-US'; id = 'section-sentence'; delay = 800; break;
                case 3: text = w.translation; lang = 'ja-JP'; id = 'section-translation'; delay = autoPlayInterval; break;
            }
            if(!text) {
                if (currentStep < 3) { currentStep++; playStep(); }
                else { currentStep = 0; if (isAutoPlay) { nextWord(true); isPlaying = true; playStep(); } else stopSpeaking(); }
                return;
            }

            highlightSection(id); updatePlayButtonUI();
            speak(text, lang, () => {
                if (!isPlaying || isPaused) return;
                activeTimeout = setTimeout(() => {
                    if (currentStep < 3) { currentStep++; playStep(); }
                    else { currentStep = 0; if (isAutoPlay) { nextWord(true); isPlaying = true; playStep(); } else { stopSpeaking(); } }
                }, delay);
            });
        }

        function toggleAutoPlay() {
            isAutoPlay = !isAutoPlay; const b = document.getElementById('btn-autoplay'), d = document.getElementById('status-dot'), p = document.getElementById('ping-indicator'), t = document.getElementById('text-autoplay');
            if (isAutoPlay) { b.className = "px-4 py-1.5 rounded-xl text-sm font-semibold border border-emerald-200 bg-emerald-50 text-emerald-800 flex items-center gap-2"; d.className = "relative inline-flex rounded-full h-3.5 w-3.5 bg-emerald-500"; p.classList.remove('hidden'); t.innerText = "自動再生 ON"; if(words.length > 0) startWordFlow(); }
            else { b.className = "px-4 py-1.5 rounded-xl text-sm font-semibold border border-slate-200 bg-white text-slate-700 flex items-center gap-2"; d.className = "relative inline-flex rounded-full h-3.5 w-3.5 bg-slate-300"; p.classList.add('hidden'); t.innerText = "自動再生 OFF"; stopSpeaking(); }
        }

        function prevWord() { stopSpeaking(); const active = getActiveWords(); if (active.length === 0) return; currentIndex = currentIndex > 0 ? currentIndex - 1 : active.length - 1; updatePlayerUI(); if (isAutoPlay) setTimeout(() => startWordFlow(), 150); }
        function nextWord(keep = false) { if (!keep) stopSpeaking(); else { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); currentStep = 0; } const active = getActiveWords(); if (active.length === 0) return; currentIndex = currentIndex < active.length - 1 ? currentIndex + 1 : 0; updatePlayerUI(); }
        function changeRate() { speechRate = parseFloat(document.getElementById('select-rate').value); }
        function changeInterval() { autoPlayInterval = parseInt(document.getElementById('select-interval').value); }

        function renderWordList() {
            const tbody = document.getElementById('word-table-body'); tbody.innerHTML = '';
            if (words.length === 0) return;
            words.forEach((w, idx) => {
                const isU = unclearWordMap[w.word] === true, tr = document.createElement('tr');
                tr.className = `hover:bg-emerald-50/40 cursor-pointer ${currentIndex === idx && playbackMode === 'all' ? 'bg-emerald-50/70 font-bold' : ''}`;
                tr.onclick = (e) => { if (e.target.closest('.unclear-checkbox')) return; playbackMode = 'all'; currentIndex = idx; switchTab('player'); updatePlayerUI(); setTimeout(() => startWordFlow(), 150); };
                tr.innerHTML = `<td class="py-3 px-4 text-center"><input type="checkbox" ${isU?'checked':''} onchange="toggleWordUnclear('${w.word}')" class="unclear-checkbox w-5 h-5 text-emerald-600 rounded"></td><td class="py-3 px-4 font-mono text-xs">${idx+1}</td><td class="py-3 px-4 font-bold text-emerald-700">${w.word}</td><td class="py-3 px-4">${w.meaning}</td><td class="py-3 px-4 hidden md:table-cell truncate max-w-xs">${w.sentence || ''}</td>`;
                tbody.appendChild(tr);
            });
        }

        function startApp() {
            try { const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u); setTimeout(() => window.speechSynthesis.cancel(), 80); } catch(e) {}
            document.getElementById('start-overlay').style.display = 'none';
            words = packs[currentPackKey] ? [...packs[currentPackKey]] : [];
            updatePlayerUI(); updateModeCounters();
        }

        window.onload = () => { initVoices(); loadUnclearData(); };
    </script>
</body>
</html>
