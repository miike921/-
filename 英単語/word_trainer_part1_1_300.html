<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Word Trainer Part 1 (1-300語)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: 'Comfortaa', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .speech-active-section { border-color: #4f46e5 !important; background-color: rgba(79, 70, 229, 0.05) !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.08); transform: scale(1.01); }
        button, select { min-height: 46px; }
        #start-overlay { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; padding: 2rem; }
        #start-btn { background: white; color: #4f46e5; font-weight: 700; font-size: 1.15rem; padding: 1.1rem 3rem; border-radius: 1rem; box-shadow: 0 8px 32px rgba(0,0,0,0.25); border: none; cursor: pointer; min-height: 60px; transition: transform 0.1s; }
        #start-btn:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-height-screen flex flex-col justify-between text-slate-800">

    <div id="start-overlay">
        <div style="text-align:center;">
            <div style="width:88px;height:88px;background:rgba(255,255,255,0.2);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
                <i class="fa-solid fa-graduation-cap" style="font-size:2.5rem;color:white;"></i>
            </div>
            <h1 class="logo-font" style="font-size:2rem;font-weight:700;color:white;margin-bottom:0.3rem;">Word Trainer</h1>
            <p style="color:rgba(199,210,254,1);font-size:0.9rem;">Part 1: 共通テスト必須 No.1〜3</p>
        </div>
        <button id="start-btn" onclick="startApp()"><i class="fa-solid fa-play" style="margin-right:0.6rem;"></i>タップして開始</button>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col lg:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i class="fa-solid fa-graduation-cap text-xl"></i></div>
                <div><h1 class="text-lg font-bold text-slate-900 logo-font">Gemini Word Trainer</h1><p class="text-[10px] text-slate-500 font-semibold">Part 1 (No.1〜3 収録)</p></div>
            </div>
            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl w-full lg:w-auto">
                <span class="text-xs font-bold text-slate-500 px-2 hidden sm:inline">教材:</span>
                <select id="select-pack" onchange="changeLearningPack()" class="bg-white border-0 text-slate-800 font-bold text-sm py-1.5 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm w-full lg:w-auto">
                    <option value="pack1" selected>No.1 ベーシック必須 100語</option>
                    <option value="pack2">No.2 対話・意見交換 100語</option>
                    <option value="pack3">No.3 図表・データ分析 100語</option>
                </select>
            </div>
            <div class="flex gap-2 w-full lg:w-auto justify-end">
                <button onclick="switchTab('player')" id="tab-btn-player" class="tab-btn flex-1 lg:flex-none px-4 py-2 rounded-lg text-sm font-semibold transition bg-indigo-50 text-indigo-700"><i class="fa-solid fa-play mr-1.5"></i>プレーヤー</button>
                <button onclick="switchTab('list')" id="tab-btn-list" class="tab-btn flex-1 lg:flex-none px-4 py-2 rounded-lg text-sm font-semibold transition text-slate-600 hover:bg-slate-100"><i class="fa-solid fa-list mr-1.5"></i>一覧 (<span class="total-count-badge">0</span>)</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto p-4 flex flex-col justify-center">
        <!-- プレーヤータブ -->
        <div id="tab-player" class="tab-content block space-y-6">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-3">
                <div class="flex flex-col sm:flex-row justify-between gap-3 pb-2 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <div class="inline-flex rounded-lg p-1 bg-slate-100">
                            <button id="mode-all-btn" onclick="setPlaybackMode('all')" class="px-3 py-1 rounded-md text-xs font-semibold bg-white text-indigo-600 shadow-sm">全単語 (<span id="count-all-words">0</span>)</button>
                            <button id="mode-unclear-btn" onclick="setPlaybackMode('unclear')" class="px-3 py-1 rounded-md text-xs font-semibold text-slate-600">わからない (<span id="count-unclear-words">0</span>)</button>
                        </div>
                    </div>
                    <span id="progress-text" class="text-sm font-bold text-slate-700">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-md p-6 sm:p-10 relative overflow-hidden min-h-[440px] flex flex-col justify-between">
                <div class="absolute top-4 right-4 z-20">
                    <button id="card-unclear-toggle" onclick="toggleCurrentUnclear()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-400 font-semibold text-xs shadow-sm"><i class="fa-regular fa-star text-sm" id="card-unclear-icon"></i><span id="card-unclear-text">わからない</span></button>
                </div>

                <div class="space-y-3.5 z-10 mt-6" id="card-content-area">
                    <div id="section-word" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2.5 py-0.5 rounded-full">Step 1: Word</span><button onclick="speakCurrentPart('word')" class="text-indigo-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <h2 id="card-word" class="text-3xl sm:text-4xl font-extrabold text-slate-950">Loading...</h2>
                    </div>
                    <div id="section-meaning" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2.5 py-0.5 rounded-full">Step 2: Meaning</span><button onclick="speakCurrentPart('meaning')" class="text-rose-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <p id="card-meaning" class="text-lg sm:text-xl font-bold text-slate-850">—</p>
                    </div>
                    <div id="section-sentence" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-teal-500 bg-teal-50 px-2.5 py-0.5 rounded-full">Step 3: Example</span><button onclick="speakCurrentPart('sentence')" class="text-teal-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <p id="card-sentence" class="text-base sm:text-lg font-medium text-slate-700 italic">—</p>
                    </div>
                    <div id="section-translation" class="p-3.5 rounded-2xl border-2 border-transparent bg-slate-50/50">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] font-bold text-amber-500 bg-amber-50 px-2.5 py-0.5 rounded-full">Step 4: Translation</span><button onclick="speakCurrentPart('translation')" class="text-amber-600 p-1"><i class="fa-solid fa-volume-high text-xs"></i></button></div>
                        <p id="card-translation" class="text-sm sm:text-base font-normal text-slate-600">—</p>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-8 pt-6 border-t border-slate-100 z-10">
                    <div class="flex items-center gap-3">
                        <button id="btn-autoplay" onclick="toggleAutoPlay()" class="px-4 py-1.5 rounded-xl text-sm font-semibold border border-emerald-200 bg-emerald-50 text-emerald-800 shadow-sm flex items-center gap-2"><span class="relative flex h-3.5 w-3.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75" id="ping-indicator"></span><span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-emerald-500" id="status-dot"></span></span><span id="text-autoplay">自動再生 ON</span></button>
                        <select id="select-interval" onchange="changeInterval()" class="bg-transparent border-b border-slate-300 text-slate-600 text-xs py-0.5"><option value="1500" selected>短め</option><option value="2500">普通</option><option value="4000">長め</option></select>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="prevWord()" class="w-12 h-12 rounded-full border border-slate-200 bg-white flex justify-center items-center shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                        <button id="btn-play-all" onclick="togglePlayPause()" class="px-8 h-12 rounded-full bg-indigo-600 text-white font-bold shadow-md flex items-center gap-2"><i class="fa-solid fa-play"></i><span id="text-play-all">再生</span></button>
                        <button onclick="nextWord()" class="w-12 h-12 rounded-full border border-slate-200 bg-white flex justify-center items-center shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <select id="select-rate" onchange="changeRate()" class="bg-transparent border-b border-slate-300 text-slate-600 text-xs py-0.5"><option value="0.8">0.8x</option><option value="1.0" selected>1.0x</option><option value="1.2">1.2x</option></select>
                </div>
            </div>
        </div>

        <!-- 一覧タブ -->
        <div id="tab-list" class="tab-content hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto max-h-[500px]">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500"><th class="py-3 px-4 w-16 text-center">マーク</th><th class="py-3 px-4 w-16">No.</th><th class="py-3 px-4">英単語</th><th class="py-3 px-4">意味</th><th class="py-3 px-4 hidden md:table-cell">例文</th></tr></thead>
                        <tbody id="word-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const packs = {
            pack1: [
                {"word":"Alternative","meaning":"代わりの、選択肢","sentence":"Is there an alternative way to solve this science problem?","translation":"この科学の問題を解決するための代替手段はありますか？"},
                {"word":"Consequence","meaning":"結果、影響","sentence":"You should consider the potential consequences of your action.","translation":"自分の行動がもたらす可能性のある結果を考慮すべきです。"},
                {"word":"Significant","meaning":"重要な、著しい","sentence":"There has been a significant increase in online communication.","translation":"オンラインコミュニケーションは著しく増加しています。"},
                {"word":"Persuade","meaning":"説得する","sentence":"It is difficult to persuade people to change their eating habits.","translation":"人々に食習慣を変えるよう説得するのは困難です。"},
                {"word":"Appreciate","meaning":"感謝する、正しく理解する","sentence":"I really appreciate your kind help during the exams.","translation":"試験中のあなたの親切な援助に本当に感謝しています。"},
                {"word":"Benefit","meaning":"恩恵、利益","sentence":"A good sleep has many physical and mental benefits.","translation":"質の良い睡眠は身体的および精神的に多くの恩恵をもたらします。"},
                {"word":"Contribute","meaning":"貢献する、寄付する","sentence":"Everyone should contribute to protecting the local environment.","translation":"誰もが地域の環境保護に貢献すべきです。"},
                {"word":"Distinguish","meaning":"区別する、聞き分ける","sentence":"Young children can distinguish between right and wrong easily.","translation":"幼い子供でも正しいことと悪いことを容易に区別できます。"},
                {"word":"Emphasize","meaning":"強調する","sentence":"My teacher always emphasizes the importance of daily review.","translation":"先生はいつも毎日の復習の大切さを強調します。"},
                {"word":"Financial","meaning":"財政上の、金銭的な","sentence":"The government provided financial support to local libraries.","translation":"政府は地域の図書館に財政的支援を提供しました。"},
                {"word":"Guarantee","meaning":"保証する","sentence":"Hard work alone does not always guarantee high scores.","translation":"努力だけが常に高い点数を保証するとは限りません。"},
                {"word":"Inevitable","meaning":"避けられない、必然的な","sentence":"With the rise of internet technology, changes were inevitable.","translation":"インターネット技術の台頭により、変化は避けられないものでした。"},
                {"word":"Observe","meaning":"観察する、気づく、規則を守る","sentence":"Students are asked to observe the behavior of the birds.","translation":"生徒たちは鳥の行動を観察するように求められています。"},
                {"word":"Predict","meaning":"予測する、予言する","sentence":"It is hard to predict the weather of next week accurately.","translation":"来週の天気を正確に予測することは困難です。"},
                {"word":"Recommend","meaning":"推薦する、勧める","sentence":"I highly recommend reading this essay for your class project.","translation":"クラスのプロジェクトのために、このエッセイを読むことを強くお勧めします。"},
                {"word":"Sufficient","meaning":"十分な、足りる","sentence":"Did you have sufficient time to finish the English reading task?","translation":"英語のリーディング課題を終わらせるのに十分な時間がありましたか？"},
                {"word":"Vulnerable","meaning":"傷つきやすい、脆弱な","sentence":"The small island is highly vulnerable to climate change.","translation":"その小さな島は気候変動の影響を非常に受けやすいです。"},
                {"word":"Withdraw","meaning":"引き出す、退く、撤回する","sentence":"The team had to withdraw from the national tournament.","translation":"チームは全国大会から撤退せざるを得ませんでした。"},
                {"word":"Exaggerate","meaning":"誇張する、大げさに言う","sentence":"Don't exaggerate the difficulty of the university exam.","translation":"大学入試の難しさを大げさに言わないでください。"},
                {"word":"Abandon","meaning":"捨てる、断念する","sentence":"We had to abandon our picnic plan because of the heavy storm.","translation":"激しい嵐のためにピクニックの計画を断念せざるを得ませんでした。"},
                {"word":"Acquire","meaning":"獲得する、習得する","sentence":"She managed to acquire excellent communication skills in college.","translation":"彼女は大学で優れたコミュニケーション能力を習得しました。"},
                {"word":"Advocate","meaning":"主張する、支持する","sentence":"Some doctors advocate eating more green vegetables daily.","translation":"一部の医師は、毎日もっと緑色野菜を食べることを推奨しています。"},
                {"word":"Ambiguous","meaning":"曖昧な、不明瞭な","sentence":"The ending of the novel was ambiguous and left readers thinking.","translation":"その小説の結末は曖昧で、読者に考えさせました。"},
                {"word":"Analyze","meaning":"分析する","sentence":"We need to analyze the data carefully before making a conclusion.","translation":"結論を出す前に、データを注意深く分析する必要があります。"},
                {"word":"Annual","meaning":"年に一度の、毎年の","sentence":"The school's annual festival is held every October.","translation":"学校の恒例の学園祭は毎年10月に開催されます。"},
                {"word":"Apparent","meaning":"明らかな、一見〜のような","sentence":"It became apparent that the system had some major errors.","translation":"システムにいくつかの重大なエラーがあることが明らかになりました。"},
                {"word":"Approach","meaning":"アプローチ、接近する","sentence":"We should try a different approach to solve this dilemma.","translation":"このジレンマを解決するために、別のアプローチを試すべきです。"},
                {"word":"Artificial","meaning":"人工的な、模造の","sentence":"The lake in the park is completely artificial.","translation":"公園の中の湖は完全に人工のものです。"},
                {"word":"Aspect","meaning":"側面、様様","sentence":"Language learning involves many different aspects of culture.","translation":"語学学習には、文化の様々な側面が含まれます。"},
                {"word":"Assume","meaning":"仮定する、思い込む","sentence":"Do not assume that everyone agrees with your opinion.","translation":"誰もがあなたの意見に同意すると仮定してはいけません。"},
                {"word":"Attitude","meaning":"態度、考え方","sentence":"A positive attitude is key to overcoming difficult situations.","translation":"前向きな態度は困難な状況を乗り越える鍵です。"},
                {"word":"Attribute","meaning":"〜のせいにする、属性","sentence":"She attributes her success to her family's endless support.","translation":"彼女は自分の成功を家族の絶え間ない支えのおかげだとしています。"},
                {"word":"Brief","meaning":"簡潔な、短い","sentence":"The guide gave us a brief explanation of the museum.","translation":"ガイドは博物館について簡潔な説明をしてくれました。"},
                {"word":"Capacity","meaning":"能力、収容力","sentence":"Humans have an amazing capacity to adapt to new environments.","translation":"人間には新しい環境に適応する素晴らしい能力があります。"},
                {"word":"Challenge","meaning":"課題、試練、挑む","sentence":"Starting a new career is always a great challenge.","translation":"新しいキャリアを始めることは常に大きな挑戦です。"},
                {"word":"Circumstance","meaning":"状況、環境","sentence":"Under no circumstances should you open this security door.","translation":"いかなる状況があっても、このセキュリティドアを開けてはいけません。"},
                {"word":"Clarify","meaning":"明確にする","sentence":"Could you please clarify your answer for the third question?","translation":"3番目の質問の回答を明確にしていただけますか？"},
                {"word":"Coherent","meaning":"一貫した、筋の通った","sentence":"He failed to give a coherent explanation for his absence.","translation":"彼は欠席に対する一貫した説明をすることができませんでした。"},
                {"word":"Collaborate","meaning":"協力する、共同で行う","sentence":"Researchers from Japan and the US decided to collaborate.","translation":"日本とアメリカの研究者が共同研究することを決定しました。"},
                {"word":"Collapse","meaning":"崩壊する、倒れる","sentence":"The old bridge collapsed after the heavy weekend rain.","translation":"週末の豪雨の後、古い橋が崩壊しました。"},
                {"word":"Commit","meaning":"尽くす、委ねる、犯す","sentence":"You must commit yourself entirely to your studies to pass.","translation":"合格するためには、勉強に全力を注ぐ必要があります。"},
                {"word":"Compensate","meaning":"補償する、埋め合わせる","sentence":"Our hard work will compensate for our lack of experience.","translation":"私たちの懸命な努力が、経験不足を補ってくれるでしょう。"},
                {"word":"Complex","meaning":"複雑な、複合体","sentence":"The brain is a complex organ that scientists still study.","translation":"脳は科学者が今なお研究している複雑な器官です。"},
                {"word":"Comply","meaning":"従う、規則を守る","sentence":"All passengers must comply with safety regulations.","translation":"すべての乗客は安全規則に従わなければなりません。"},
                {"word":"Component","meaning":"構成要素、部品","sentence":"Listening is a crucial component of language learning.","translation":"リスニングは言語学習の極めて重要な構成要素です。"},
                {"word":"Compromise","meaning":"妥協、妥協する","sentence":"After a long discussion, they reached a sensible compromise.","translation":"長い議論の末、彼らは確かな妥協点に達しました。"},
                {"word":"Concentrate","meaning":"集中する","sentence":"It is hard to concentrate on reading in a noisy room.","translation":"騒がしい部屋の中で読書に集中するのは難しいです。"},
                {"word":"Concept","meaning":"概念、考え方","sentence":"The concept of time travel has inspired many movies.","translation":"タイムトラベルの概念は多くの映画にインスピレーションを与えてきました。"},
                {"word":"Conclude","meaning":"結論づける、終える","sentence":"The researcher concluded that the experiment was successful.","translation":"研究者はその実験が成功したと結論づけました。"},
                {"word":"Conduct","meaning":"行う、行動","sentence":"We are going to conduct a survey about study habits.","translation":"私たちは学習習慣に関する調査を行う予定です。"},
                {"word":"Confirm","meaning":"確認する、裏付ける","sentence":"Please call the hotel to confirm your room reservation.","translation":"ホテルの予約を確認するために、電話をかけてください。"},
                {"word":"Conflict","meaning":"対立、葛藤","sentence":"There was a conflict between his duties and his desires.","translation":"彼の義務と個人的な欲望の間で葛藤がありました。"},
                {"word":"Consent","meaning":"同意、承諾","sentence":"You cannot post photos of others without their consent.","translation":"他人の同意なしに写真を投稿することはできません。"},
                {"word":"Considerable","meaning":"かなりの、相当な","sentence":"The construction project cost a considerable amount of money.","translation":"その建設プロジェクトにはかなりの額の費用がかかりました。"},
                {"word":"Constant","meaning":"絶え間ない、一定の","sentence":"He is in constant contact with his classmates online.","translation":"彼はオンラインでクラスメイトと常に連絡を取り合っています。"},
                {"word":"Constrain","meaning":"制限する、束縛する","sentence":"We are constrained by a very tight budget for this trip.","translation":"私たちはこの旅行に関して非常に厳しい予算に制限されています。"},
                {"word":"Consult","meaning":"相談する、調べる","sentence":"You should consult a dictionary if you don't know the word.","translation":"その単語を知らない場合は、辞書を引くべきです。"},
                {"word":"Consume","meaning":"消費する、食べる","sentence":"Smartphones consume a lot of battery during video playback.","translation":"スマートフォンは動画再生中に多くのバッテリーを消費します。"},
                {"word":"Contradict","meaning":"矛盾する、反論する","sentence":"Her behavior often contradicts her words.","translation":"彼女の行動はしばしば言葉と矛盾します。"},

                u.onend = () => { window.activeUtterance = null; setTimeout(() => { if (callback) callback(); }, 120); };
                u.onerror = () => { window.activeUtterance = null; setTimeout(() => { if (callback) callback(); }, 120); };
                window.speechSynthesis.speak(u);
            }, 120);
        }

        function changeLearningPack() {
            stopSpeaking();
            currentPackKey = document.getElementById('select-pack').value;
            words = packs[currentPackKey] ? [...packs[currentPackKey]] : [];
            currentIndex = 0;
            playbackMode = 'all';
            updatePlayerUI();
            updateModeCounters();
            if (isAutoPlay && words.length > 0) setTimeout(() => startWordFlow(), 200);
        }

        function switchTab(tabName) {
            stopSpeaking();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-indigo-50', 'text-indigo-700'); b.classList.add('text-slate-600', 'hover:bg-slate-100'); });
            const active = document.getElementById(`tab-btn-${tabName}`);
            active.classList.remove('text-slate-600', 'hover:bg-slate-100'); active.classList.add('bg-indigo-50', 'text-indigo-700');
            if (tabName === 'list') renderWordList();
        }

        function getActiveWords() { return playbackMode === 'unclear' ? words.filter(w => unclearWordMap[w.word] === true) : words; }

        function setPlaybackMode(mode) {
            stopSpeaking();
            if (mode === 'unclear' && words.filter(w => unclearWordMap[w.word] === true).length === 0) { alert("わからない登録されている単語がありません。"); return; }
            playbackMode = mode; currentIndex = 0;
            const a = document.getElementById('mode-all-btn'), u = document.getElementById('mode-unclear-btn');
            if (mode === 'all') { a.className = "px-3 py-1 rounded-md text-xs font-semibold bg-white text-indigo-600 shadow-sm"; u.className = "px-3 py-1 rounded-md text-xs font-semibold text-slate-600"; }
            else { a.className = "px-3 py-1 rounded-md text-xs font-semibold text-slate-600"; u.className = "px-3 py-1 rounded-md text-xs font-semibold bg-white text-indigo-600 shadow-sm"; }
            updatePlayerUI(); updateModeCounters();
            if (isAutoPlay && words.length > 0) startWordFlow();
        }

        function updateModeCounters() {
            document.getElementById('count-all-words').innerText = words.length;
            document.getElementById('count-unclear-words').innerText = words.filter(w => unclearWordMap[w.word] === true).length;
            document.querySelectorAll('.total-count-badge').forEach(b => b.innerText = words.length);
        }

        function updatePlayerUI() {
            if (words.length === 0) return;
            const active = getActiveWords(), w = active[currentIndex];
            if (!w) { if (playbackMode === 'unclear') setPlaybackMode('all'); return; }
            document.getElementById('card-word').innerText = w.word;
            document.getElementById('card-meaning').innerText = w.meaning;
            document.getElementById('card-sentence').innerText = w.sentence || "—";
            document.getElementById('card-translation').innerText = w.translation || "—";
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${active.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / active.length) * 100}%`;
            updateUnclearCardBtn(w.word); resetSectionsVisual();
        }

        function resetSectionsVisual() { ['section-word', 'section-meaning', 'section-sentence', 'section-translation'].forEach(id => document.getElementById(id).classList.remove('speech-active-section')); }
        function highlightSection(id) { resetSectionsVisual(); document.getElementById(id).classList.add('speech-active-section'); }

        function updateUnclearCardBtn(word) {
            const isU = unclearWordMap[word] === true, b = document.getElementById('card-unclear-toggle'), i = document.getElementById('card-unclear-icon'), t = document.getElementById('card-unclear-text');
            if (isU) { i.className = "fa-solid fa-star text-amber-500"; t.innerText = "わからない登録済"; b.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-amber-200 bg-amber-50 text-amber-700 text-xs font-semibold shadow-sm"; }
            else { i.className = "fa-regular fa-star text-slate-400"; t.innerText = "わからない"; b.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-400 text-xs font-semibold shadow-sm"; }
        }

        function toggleCurrentUnclear() { const active = getActiveWords(), w = active[currentIndex]; if (!w) return; unclearWordMap[w.word] = !unclearWordMap[w.word]; saveUnclearData(); updateUnclearCardBtn(w.word); updateModeCounters(); }
        function toggleWordUnclear(word) { unclearWordMap[word] = !unclearWordMap[word]; saveUnclearData(); updateModeCounters(); const active = getActiveWords(), w = active[currentIndex]; if (w && w.word === word) updateUnclearCardBtn(word); }

        function speakCurrentPart(part) { stopSpeaking(); const active = getActiveWords(), w = active[currentIndex]; if (!w) return; setTimeout(() => { if (part === 'word') { highlightSection('section-word'); speak(w.word, 'en-US'); } else if (part === 'meaning') { highlightSection('section-meaning'); speak(w.meaning, 'ja-JP'); } else if (part === 'sentence' && w.sentence) { highlightSection('section-sentence'); speak(w.sentence, 'en-US'); } else if (part === 'translation' && w.translation) { highlightSection('section-translation'); speak(w.translation, 'ja-JP'); } }, 100); }
        function stopSpeaking() { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); isPlaying = false; isPaused = false; currentStep = 0; resetSectionsVisual(); updatePlayButtonUI(); }
        function pauseSpeaking() { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); isPaused = true; updatePlayButtonUI(); }

        function togglePlayPause() { if (words.length === 0) return; if (!isPlaying) startWordFlow(); else if (isPaused) { isPaused = false; updatePlayButtonUI(); playStep(); } else pauseSpeaking(); }

        function updatePlayButtonUI() {
            const b = document.getElementById('btn-play-all'); if (!b) return;
            if (!isPlaying) b.innerHTML = `<i class="fa-solid fa-play"></i><span>再生</span>`;
            else if (isPaused) b.innerHTML = `<i class="fa-solid fa-play"></i><span>再開</span>`;
            else b.innerHTML = `<i class="fa-solid fa-pause"></i><span>停止</span>`;
        }

        function startWordFlow() { if (words.length === 0) return; stopSpeaking(); isPlaying = true; isPaused = false; currentStep = 0; playStep(); }

        function playStep() {
            if (!isPlaying || isPaused) return; const active = getActiveWords(), w = active[currentIndex]; if (!w) return;
            let text = "", lang = "", id = "", delay = 1000;
            switch (currentStep) {
                case 0: text = w.word; lang = 'en-US'; id = 'section-word'; delay = 800; break;
                case 1: text = w.meaning; lang = 'ja-JP'; id = 'section-meaning'; delay = w.sentence ? 1000 : autoPlayInterval; break;
                case 2: text = w.sentence; lang = 'en-US'; id = 'section-sentence'; delay = 800; break;
                case 3: text = w.translation; lang = 'ja-JP'; id = 'section-translation'; delay = autoPlayInterval; break;
            }
            if(!text) {
                if (currentStep < 3) { currentStep++; playStep(); }
                else { currentStep = 0; if (isAutoPlay) { nextWord(true); isPlaying = true; playStep(); } else stopSpeaking(); }
                return;
            }

            highlightSection(id); updatePlayButtonUI();
            speak(text, lang, () => {
                if (!isPlaying || isPaused) return;
                activeTimeout = setTimeout(() => {
                    if (currentStep < 3) { currentStep++; playStep(); }
                    else { currentStep = 0; if (isAutoPlay) { nextWord(true); isPlaying = true; playStep(); } else { stopSpeaking(); } }
                }, delay);
            });
        }

        function toggleAutoPlay() {
            isAutoPlay = !isAutoPlay; const b = document.getElementById('btn-autoplay'), d = document.getElementById('status-dot'), p = document.getElementById('ping-indicator'), t = document.getElementById('text-autoplay');
            if (isAutoPlay) { b.className = "px-4 py-1.5 rounded-xl text-sm font-semibold border border-emerald-200 bg-emerald-50 text-emerald-800 flex items-center gap-2"; d.className = "relative inline-flex rounded-full h-3.5 w-3.5 bg-emerald-500"; p.classList.remove('hidden'); t.innerText = "自動再生 ON"; if(words.length > 0) startWordFlow(); }
            else { b.className = "px-4 py-1.5 rounded-xl text-sm font-semibold border border-slate-200 bg-white text-slate-700 flex items-center gap-2"; d.className = "relative inline-flex rounded-full h-3.5 w-3.5 bg-slate-300"; p.classList.add('hidden'); t.innerText = "自動再生 OFF"; stopSpeaking(); }
        }

        function prevWord() { stopSpeaking(); const active = getActiveWords(); if (active.length === 0) return; currentIndex = currentIndex > 0 ? currentIndex - 1 : active.length - 1; updatePlayerUI(); if (isAutoPlay) setTimeout(() => startWordFlow(), 150); }
        function nextWord(keep = false) { if (!keep) stopSpeaking(); else { window.speechSynthesis.cancel(); if (activeTimeout) clearTimeout(activeTimeout); currentStep = 0; } const active = getActiveWords(); if (active.length === 0) return; currentIndex = currentIndex < active.length - 1 ? currentIndex + 1 : 0; updatePlayerUI(); }
        function changeRate() { speechRate = parseFloat(document.getElementById('select-rate').value); }
        function changeInterval() { autoPlayInterval = parseInt(document.getElementById('select-interval').value); }

        function renderWordList() {
            const tbody = document.getElementById('word-table-body'); tbody.innerHTML = '';
            if (words.length === 0) return;
            words.forEach((w, idx) => {
                const isU = unclearWordMap[w.word] === true, tr = document.createElement('tr');
                tr.className = `hover:bg-indigo-50/40 cursor-pointer ${currentIndex === idx && playbackMode === 'all' ? 'bg-indigo-50/70 font-bold' : ''}`;
                tr.onclick = (e) => { if (e.target.closest('.unclear-checkbox')) return; playbackMode = 'all'; currentIndex = idx; switchTab('player'); updatePlayerUI(); setTimeout(() => startWordFlow(), 150); };
                tr.innerHTML = `<td class="py-3 px-4 text-center"><input type="checkbox" ${isU?'checked':''} onchange="toggleWordUnclear('${w.word}')" class="unclear-checkbox w-5 h-5 text-indigo-600 rounded"></td><td class="py-3 px-4 font-mono text-xs">${idx+1}</td><td class="py-3 px-4 font-bold text-indigo-700">${w.word}</td><td class="py-3 px-4">${w.meaning}</td><td class="py-3 px-4 hidden md:table-cell truncate max-w-xs">${w.sentence || ''}</td>`;
                tbody.appendChild(tr);
            });
        }

        function startApp() {
            try { const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u); setTimeout(() => window.speechSynthesis.cancel(), 80); } catch(e) {}
            document.getElementById('start-overlay').style.display = 'none';
            words = packs[currentPackKey] ? [...packs[currentPackKey]] : [];
            updatePlayerUI(); updateModeCounters();
        }

        window.onload = () => { initVoices(); loadUnclearData(); };
    </script>
</body>
</html>
